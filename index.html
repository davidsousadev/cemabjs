<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CemabJS</title>

    <!-- CodeMirror -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">

    <style>
        body {
            margin: 0;
            background: #0f172a;
            color: white;
            font-family: Arial;
        }

        header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            border-bottom: 1px solid #1f2937;
            font-size: 18px;
            font-weight: bold;
        }

        header img {
            width: 32px;
            height: 32px;
            border-radius: 6px;
        }

        main {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 15px;
            margin-right: 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        #saida {
            background: black;
            color: #22c55e;
            padding: 10px;
            min-height: 120px;
            border-radius: 6px;
            margin-top: 15px;
            font-family: monospace;
        }
    </style>
</head>

<body>

    <header>
        <img src="icon.jpeg">
        <span>CEMAB - JS</span>
    </header>

    <main>

        <textarea id="editor"></textarea>

        <br><br>

        <button onclick="executar()">▶ Executar</button>
        <button onclick="limpar()">🧹 Limpar</button>
        <button onclick="salvar()">💾 Salvar</button>

        <pre id="saida"></pre>

    </main>

    <!-- CodeMirror -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>

    <!-- ADDONS IMPORTANTES -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>

    <script>
        let editor = CodeMirror.fromTextArea(document.getElementById("editor"), {
            mode: "javascript",
            theme: "material-darker",
            lineNumbers: true,

            // 🔥 AUTO INDENTAÇÃO
            indentUnit: 4,
            tabSize: 4,
            indentWithTabs: false,
            smartIndent: true,

            // 🔥 FECHAR AUTOMÁTICO {}, (), []
            autoCloseBrackets: true,
            matchBrackets: true,

            // 🔥 TAB FUNCIONANDO
            extraKeys: {
                "Tab": function (cm) {
                    if (cm.somethingSelected()) {
                        cm.indentSelection("add");
                    } else {
                        cm.replaceSelection("    ", "end");
                    }
                },
                "Shift-Tab": function (cm) {
                    cm.indentSelection("subtract");
                },
                "Enter": function (cm) {
                    cm.execCommand("newlineAndIndent");
                }
            }
        });

        // Executar JS
        function executar() {
            let saida = document.getElementById("saida");
            saida.innerHTML = "";

            console.log = function (...msg) {
                saida.innerHTML += msg.join(" ") + "<br>";
            };

            try {
                eval(editor.getValue());
            } catch (erro) {
                saida.innerHTML = erro;
            }
        }

        // Salvar
        function salvar() {
            let nome = prompt("Nome do arquivo:", "");
            if (!nome) return;

            if (!nome.endsWith(".js")) nome += ".js";

            let blob = new Blob([editor.getValue()], { type: "text/javascript" });
            let link = document.createElement("a");

            link.href = URL.createObjectURL(blob);
            link.download = nome;
            link.click();
        }

        // Limpar
        function limpar() {
            document.getElementById("saida").innerHTML = "";
        }
    </script>

</body>

</html>
