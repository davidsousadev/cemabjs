<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CemabJS</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">

    <style>
        body {
            margin: 0;
            background: #0f172a;
            color: white;
            font-family: Arial;
        }

        main {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        #saida {
            background: black;
            color: #22c55e;
            padding: 10px;
            min-height: 220px;
            border-radius: 6px;
            margin-top: 15px;
            font-family: monospace;
            white-space: pre-wrap;
        }

        /* cursor bonito */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 1em;
            background: #22c55e;
            margin-left: 2px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        /* tema hacker */
        .CodeMirror {
            background: #000 !important;
            color: #00ff9c !important;
        }
    </style>
</head>

<body>

    <main>

        <textarea id="editor"></textarea>

        <br><br>

        <button onclick="executar()">▶ Executar</button>
        <button onclick="limpar()">🧹 Limpar</button>

        <pre id="saida"></pre>

        <!-- input invisível -->
        <input id="fakeInput" style="opacity:0; position:absolute; left:-9999px;">

    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>

    <script>
        let editor = CodeMirror.fromTextArea(document.getElementById("editor"), {
            mode: "javascript",
            theme: "material-darker",
            lineNumbers: true
        });

        // 🔥 AUTO FECHAR { [ (
        editor.on("keydown", (cm, e) => {
            const pairs = { "(": ")", "{": "}", "[": "]" };

            if (pairs[e.key]) {
                e.preventDefault();
                let cursor = cm.getCursor();
                cm.replaceRange(e.key + pairs[e.key], cursor);
                cm.setCursor({ line: cursor.line, ch: cursor.ch + 1 });
            }
        });

        let saida = document.getElementById("saida");
        let fakeInput = document.getElementById("fakeInput");

        let resolverInput = null;
        let buffer = "";
        let linhas = [];
        let historico = [];
        let posHistorico = -1;

        // clicar ativa teclado
        saida.addEventListener("click", () => {
            fakeInput.focus();
        });

        // prompt vira terminal
        window.prompt = async (msg) => await input(msg);

        // render SEM quebrar cursor
        function render() {
            let texto = linhas.join("\n");

            if (resolverInput) {
                texto += `\n> ${buffer}`;
            }

            saida.innerHTML = texto;

            // 🔥 adiciona cursor separado (NÃO quebra animação)
            if (resolverInput) {
                let span = document.createElement("span");
                span.className = "cursor";
                saida.appendChild(span);
            }

            saida.scrollTop = saida.scrollHeight;
        }

        function input(msg = "") {
            return new Promise(resolve => {
                linhas.push(msg);
                buffer = "";
                resolverInput = resolve;
                render();
                fakeInput.focus();
            });
        }

        // 🔥 INPUT MOBILE (CORRIGIDO)
        fakeInput.addEventListener("input", () => {
            if (!resolverInput) return;

            buffer += fakeInput.value;
            fakeInput.value = "";
            render();
        });

        fakeInput.addEventListener("keydown", (e) => {
            if (!resolverInput) return;

            if (e.key === "Backspace") {
                e.preventDefault();
                buffer = buffer.slice(0, -1);
            }
            else if (e.key === "Enter") {
                e.preventDefault();

                linhas.push("> " + buffer);
                historico.push(buffer);
                posHistorico = historico.length;

                resolverInput(buffer);
                resolverInput = null;
                buffer = "";
            }
            else if (e.key === "ArrowUp") {
                e.preventDefault();
                if (posHistorico > 0) {
                    posHistorico--;
                    buffer = historico[posHistorico];
                }
            }
            else if (e.key === "ArrowDown") {
                e.preventDefault();
                if (posHistorico < historico.length - 1) {
                    posHistorico++;
                    buffer = historico[posHistorico];
                } else {
                    buffer = "";
                }
            }

            render();
        });

        // executar
        async function executar() {
            linhas = [];
            buffer = "";
            resolverInput = null;
            render();

            console.log = (...msg) => {
                linhas.push(msg.join(" "));
                render();
            };

            try {
                await eval(`(async () => { ${editor.getValue()} })()`);
            } catch (e) {
                linhas.push("Erro: " + e);
                render();
            }
        }

        function limpar() {
            linhas = [];
            render();
        }
    </script>

</body>

</html>
