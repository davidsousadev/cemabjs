<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CemabJS</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.css">

    <style>
        body {
            margin: 0;
            background: #0f172a;
            color: white;
            font-family: Arial;
        }

        header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            border-bottom: 1px solid #1f2937;
            font-size: 18px;
            font-weight: bold;
        }

        header img {
            width: 32px;
            height: 32px;
            border-radius: 6px;
        }

        main {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 15px;
            margin-right: 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        #saida {
            background: black;
            color: #22c55e;
            padding: 10px;
            min-height: 200px;
            border-radius: 6px;
            margin-top: 15px;
            font-family: monospace;
            white-space: pre-wrap;
            cursor: text;
        }

        /* cursor piscando */
        .cursor {
            display: inline-block;
            width: 8px;
            background: #22c55e;
            margin-left: 2px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        footer {
            text-align: center;
            padding: 12px;
            border-top: 1px solid #1f2937;
            font-size: 14px;
            color: #94a3b8;
        }

        footer a {
            color: #60a5fa;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* 🔥 TEMA HACKER */
        .CodeMirror {
            background: #000 !important;
            color: #00ff9c !important;
        }

        .CodeMirror-cursor {
            border-left: 2px solid #00ff9c !important;
        }

        .cm-keyword {
            color: #00ff9c;
        }

        .cm-string {
            color: #22c55e;
        }

        .cm-number {
            color: #4ade80;
        }
    </style>
</head>

<body>

    <header>
        <img src="icon.jpeg">
        <span>CEMAB - JS</span>
    </header>

    <main>

        <textarea id="editor"></textarea>

        <br><br>

        <button onclick="executar()">▶ Executar</button>
        <button onclick="limpar()">🧹 Limpar</button>
        <button onclick="salvar()">💾 Salvar</button>

        <pre id="saida"></pre>

    </main>

    <footer>
        Criado com ❤️ por <a href="https://github.com/davidsousadev" target="_blank">David Sousa</a>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>

    <!-- ADDONS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/javascript-hint.min.js"></script>

    <script>
        let editor = CodeMirror.fromTextArea(document.getElementById("editor"), {
            mode: "javascript",
            theme: "material-darker",
            lineNumbers: true,

            indentUnit: 4,
            tabSize: 4,
            smartIndent: true,

            autoCloseBrackets: true,
            matchBrackets: true,

            extraKeys: {
                "Tab": cm => cm.replaceSelection("    "),
                "Ctrl-Space": "autocomplete",
                "Enter": cm => cm.execCommand("newlineAndIndent")
            }
        });

        // 🔥 SNIPPETS
        const snippets = {
            "for": "for (let i = 0; i < 10; i++) {\n    \n}",
            "if": "if (condition) {\n    \n}",
            "while": "while (condition) {\n    \n}",
            "func": "function nome() {\n    \n}"
        };

        // 🔥 PEGAR VARIÁVEIS DO CÓDIGO
        function getVariables(code) {
            let vars = [];
            let regex = /\b(let|const|var|function)\s+([a-zA-Z_$][\w$]*)/g;
            let match;

            while ((match = regex.exec(code))) {
                vars.push(match[2]);
            }

            return vars;
        }

        // 🔥 AUTOCOMPLETE PRO
        editor.on("inputRead", function (cm, change) {
            let cursor = cm.getCursor();
            let token = cm.getTokenAt(cursor);
            let word = token.string;

            // snippets
            if (snippets[word]) {
                cm.replaceRange(snippets[word], {
                    line: cursor.line,
                    ch: token.start
                }, {
                    line: cursor.line,
                    ch: token.end
                });
                return;
            }

            // autocomplete normal
            if (word.match(/[a-zA-Z]/)) {
                let code = cm.getValue();
                let vars = getVariables(code);

                let list = [
                    "console", "log", "Math", "random",
                    "document", "window", "alert","prompt",
                    ...vars
                ];

                CodeMirror.showHint(cm, function () {
                    return {
                        list: list,
                        from: CodeMirror.Pos(cursor.line, token.start),
                        to: CodeMirror.Pos(cursor.line, token.end)
                    };
                });
            }
        });

        // 🔥 FECHAMENTO INTELIGENTE
        editor.on("keydown", function (cm, e) {
            const pairs = { "(": ")", "{": "}", "[": "]" };

            if (pairs[e.key]) {
                e.preventDefault();
                const doc = cm.getDoc();
                const cursor = doc.getCursor();

                doc.replaceRange(e.key + pairs[e.key], cursor);
                doc.setCursor({ line: cursor.line, ch: cursor.ch + 1 });
            }
        });

        let saida = document.getElementById("saida");

        let resolverInput = null;
        let buffer = "";
        let linhas = [];
        let historico = [];
        let posHistorico = -1;

        // prompt vira input
        window.prompt = async (msg) => await input(msg);

        function render() {
            saida.innerHTML = linhas.join("\n") +
                (resolverInput ? `\n> ${buffer}<span class="cursor">&nbsp;</span>` : "");
            saida.scrollTop = saida.scrollHeight;
        }

        function input(msg = "") {
            return new Promise(resolve => {
                linhas.push(msg);
                buffer = "";
                resolverInput = resolve;
                render();
            });
        }

        // 🔥 TERMINAL COM HISTÓRICO
        document.addEventListener("keydown", function (e) {
            if (!resolverInput) return;

            e.preventDefault();

            if (e.key === "Backspace") {
                buffer = buffer.slice(0, -1);
            }
            else if (e.key === "Enter") {
                linhas.push("> " + buffer);
                historico.push(buffer);
                posHistorico = historico.length;

                resolverInput(buffer);
                resolverInput = null;
                buffer = "";
            }
            else if (e.key === "ArrowUp") {
                if (posHistorico > 0) {
                    posHistorico--;
                    buffer = historico[posHistorico];
                }
            }
            else if (e.key === "ArrowDown") {
                if (posHistorico < historico.length - 1) {
                    posHistorico++;
                    buffer = historico[posHistorico];
                } else {
                    buffer = "";
                }
            }
            else if (e.key.length === 1) {
                buffer += e.key;
            }

            render();
        });

        // executar
        async function executar() {
            linhas = [];
            buffer = "";
            resolverInput = null;
            render();

            console.log = (...msg) => {
                linhas.push(msg.join(" "));
                render();
            };

            try {
                await eval(`(async () => { ${editor.getValue()} })()`);
            } catch (e) {
                linhas.push("Erro: " + e);
                render();
            }
        }

        // salvar
        function salvar() {
            let nome = "codigo_" + Date.now() + ".js";

            let blob = new Blob([editor.getValue()], { type: "text/javascript" });
            let link = document.createElement("a");

            link.href = URL.createObjectURL(blob);
            link.download = nome;
            link.click();
        }

        function limpar() {
            linhas = [];
            render();
        }
    </script>

</body>

</html>
