<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CemabJS</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">

    <style>
        body {
            margin: 0;
            background: #0f172a;
            color: white;
            font-family: Arial;
        }

        main {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            border-bottom: 1px solid #1f2937;
            font-weight: bold;
        }

        #saida {
            background: black;
            color: #22c55e;
            padding: 10px;
            min-height: 220px;
            border-radius: 6px;
            margin-top: 15px;
            font-family: monospace;
            white-space: pre-wrap;
        }

        /* cursor bonito */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 1em;
            background: #22c55e;
            margin-left: 2px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        /* tema hacker */
        .CodeMirror {
            background: #000 !important;
            color: #00ff9c !important;
        }

        footer {
            text-align: center;
            padding: 12px;
            border-top: 1px solid #1f2937;
            color: #94a3b8;
        }
    </style>
</head>

<body>
    <header>
        <img src="icon.jpeg" width="32">
        CEMAB - JS
    </header>
    <main>

        <textarea id="editor"></textarea>

        <br><br>

        <button onclick="executar()">▶ Executar</button>
        <button onclick="limpar()">🧹 Limpar</button>
        <button onclick="salvar()">💾 Salvar</button>
        <pre id="saida"></pre>

        <!-- input invisível -->
        <input id="fakeInput" style="opacity:0; position:absolute; left:-9999px;">

    </main>
    <footer>
        Criado com ❤️ por <a href="https://github.com/davidsousadev" target="_blank">David Sousa</a>
    </footer>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>

    <script>
        let editor = CodeMirror.fromTextArea(document.getElementById("editor"), {
            mode: "javascript",
            theme: "material-darker",
            lineNumbers: true
        });

        // auto fechar
        editor.on("keydown", (cm, e) => {
            const pairs = { "(": ")", "{": "}", "[": "]" };
            if (pairs[e.key]) {
                e.preventDefault();
                let c = cm.getCursor();
                cm.replaceRange(e.key + pairs[e.key], c);
                cm.setCursor({ line: c.line, ch: c.ch + 1 });
            }
        });

        let saida = document.getElementById("saida");
        let fakeInput = document.getElementById("fakeInput");

        let resolverInput = null;
        let buffer = "";
        let historico = [];
        let posHistorico = -1;

        // 🔥 estado real do terminal
        let terminalTexto = "";

        // ===== CURSOR =====
        function renderCursor() {
            saida.innerHTML = "";

            const texto = document.createTextNode(terminalTexto);
            const cursor = document.createElement("span");

            cursor.className = "cursor";

            saida.appendChild(texto);
            saida.appendChild(cursor);

            saida.scrollTop = saida.scrollHeight;
        }

        // ===== PRINT =====
        function print(txt) {
            terminalTexto += txt + "\n";
            renderCursor();
        }

        // ===== INPUT =====
        function input(msg = "") {
            return new Promise(resolve => {
                terminalTexto += msg;
                renderCursor();

                buffer = "";
                resolverInput = resolve;

                fakeInput.focus();
            });
        }

        // substituir prompt
        window.prompt = async (msg) => await input(msg);

        // ===== INPUT CAPTURA =====
        fakeInput.addEventListener("input", () => {
            if (!resolverInput) return;

            buffer += fakeInput.value;
            fakeInput.value = "";

            terminalTexto += buffer.slice(-1);
            renderCursor();
        });

        fakeInput.addEventListener("keydown", (e) => {
            if (!resolverInput) return;

            if (e.key === "Backspace") {
                e.preventDefault();
                buffer = buffer.slice(0, -1);
                terminalTexto = terminalTexto.slice(0, -1);
            }

            else if (e.key === "Enter") {
                e.preventDefault();

                terminalTexto += "\n";

                historico.push(buffer);
                posHistorico = historico.length;

                resolverInput(buffer);
                resolverInput = null;
                buffer = "";
            }

            else if (e.key === "ArrowUp") {
                e.preventDefault();
                if (posHistorico > 0) {
                    posHistorico--;
                    buffer = historico[posHistorico];

                    // limpa linha atual
                    let linhas = terminalTexto.split("\n");
                    linhas[linhas.length - 1] = "> " + buffer;
                    terminalTexto = linhas.join("\n");
                }
            }

            else if (e.key === "ArrowDown") {
                e.preventDefault();
                if (posHistorico < historico.length - 1) {
                    posHistorico++;
                    buffer = historico[posHistorico];
                } else {
                    buffer = "";
                }
            }

            renderCursor();
        });

        // clicar ativa teclado (mobile incluso)
        saida.addEventListener("click", () => fakeInput.focus());
        saida.addEventListener("touchstart", () => fakeInput.focus());

        // ===== EXECUTAR =====
        async function executar() {
            terminalTexto = "";
            buffer = "";
            resolverInput = null;
            renderCursor();

            console.log = (...msg) => {
                print(msg.join(" "));
            };

            try {
                await eval(`(async () => { ${editor.getValue()} })()`);
            } catch (e) {
                print("Erro: " + e);
            }
        }

        // ===== LIMPAR =====
        function limpar() {
            terminalTexto = "";
            renderCursor();
        }

        // ===== SALVAR =====
        function salvar() {
            let nome = "codigo_" + Date.now() + ".js";
            let blob = new Blob([editor.getValue()], { type: "text/javascript" });

            let link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = nome;
            link.click();
        }

        // iniciar
        renderCursor();
    </script>

</body>

</html>
